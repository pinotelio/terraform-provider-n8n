name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Run linters
        # Pinned: golangci-lint v1.x (matches the v1-format .golangci.yml) and the
        # v6 action that supports it. "latest" floats to v2, which cannot read a
        # v1 config.
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
